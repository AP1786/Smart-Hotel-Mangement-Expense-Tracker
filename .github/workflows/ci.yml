name: Hybrid dApp CI

on:
  push:
    branches:
      - main
      - develop
      - 'codex/**'
  pull_request:

jobs:
  js-quality:
    name: JavaScript Quality
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Run ESLint
        run: npm run lint

      - name: Build frontend and contracts
        run: npm run build

      - name: Run Hardhat tests
        run: npm run test -w contracts

  python-ledger:
    name: Python Ledger Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r blockchain-core/requirements.txt

      - name: Run ledger tests
        run: python -m pytest blockchain-core/tests

  slither-audit:
    name: Slither Audit
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Compile contracts
        run: npm run compile -w contracts

      - name: Install Slither
        run: |
          python -m pip install --upgrade pip
          python -m pip install slither-analyzer

      - name: Run Slither
        run: slither contracts --filter-paths "node_modules|test|cache|artifacts" --exclude timestamp
